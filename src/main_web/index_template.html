<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>raylib-6-jam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas.game_canvas {
            border: 0; background: #000;
            display: block;
            padding-left: 0; padding-right: 0;
            margin-left: auto; margin-right: auto;
            width: min(720px, 100vw, 100vh);
            height: min(720px, 100vw, 100vh);
        }
    </style>
</head>
<body>
    <canvas class="game_canvas" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"
            onmousedown="event.target.focus()"></canvas>
    <div id="mp-status" style="position:absolute; top:4px; left:4px; color:#0f0; font:12px monospace; z-index:1000; pointer-events:none;"></div>
    <script type="text/javascript" src="odin.js"></script>
    <script>
        var odinMemoryInterface = new odin.WasmMemoryInterface();
        odinMemoryInterface.setIntSize(4);
        var odinImports = odin.setupDefaultImports(odinMemoryInterface);

        const MP_HAND_LANDMARK_COUNT = 21;
        const MP_VALUES_PER_LANDMARK = 3;
        window.mpLatestResults = null;
        window.mpStatusText = "MediaPipe: idle";
        window.mpStatusCode = 0;

        function setMpStatus(code, text) {
            window.mpStatusCode = code;
            window.mpStatusText = text;
            console.log("[MediaPipe] " + text);
            const el = document.getElementById("mp-status");
            if (el) el.textContent = text;
        }

        odinImports.game_bridge = {
            get_hand_landmarks: (ptr, maxHands) => {
                if (!window.mpLatestResults || !window.mpLatestResults.landmarks) {
                    return 0;
                }
                const hands = window.mpLatestResults.landmarks;
                const count = Math.min(hands.length, maxHands);
                const floatsNeeded = count * MP_HAND_LANDMARK_COUNT * MP_VALUES_PER_LANDMARK;
                const mem = odinMemoryInterface.loadF32Array(ptr, floatsNeeded);
                for (let h = 0; h < count; h++) {
                    const landmarks = hands[h];
                    for (let i = 0; i < MP_HAND_LANDMARK_COUNT; i++) {
                        const lm = landmarks[i];
                        const idx = (h * MP_HAND_LANDMARK_COUNT + i) * MP_VALUES_PER_LANDMARK;
                        mem[idx + 0] = lm.x;
                        mem[idx + 1] = lm.y;
                        mem[idx + 2] = lm.z;
                    }
                }
                return count;
            },
            get_hand_tracking_status: () => {
                return window.mpStatusCode;
            }
        };

        var Module = {
            instantiateWasm: (imports, successCallback) => {
                const newImports = { ...odinImports, ...imports };
                return WebAssembly.instantiateStreaming(fetch("index.wasm"), newImports).then(function(output) {
                    var e = output.instance.exports;
                    odinMemoryInterface.setExports(e);
                    odinMemoryInterface.setMemory(e.memory);
                    return successCallback(output.instance);
                });
            },
            onRuntimeInitialized: () => {
                var e = wasmExports;
                e._start();
                e.main_start();

                function do_main_update() {
                    if (!e.main_update()) {
                        e.main_end();
                        e._end();
                        return;
                    }
                    window.requestAnimationFrame(do_main_update);
                }
                window.requestAnimationFrame(do_main_update);
            },
            canvas: (function() {
                return document.getElementById("canvas");
            })()
        };
    </script>
    {{{ SCRIPT }}}
    <script>
        window.addEventListener("message", (event) => {
            const data = event.data;
            if (!data) return;
            if (data.type === "results") {
                window.mpLatestResults = data.results;
            } else if (data.type === "status") {
                setMpStatus(data.code, data.text);
            }
        });

        const MP_VERSION = "0.10.18";
        const iframeSrcdoc = `
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>body{margin:0;overflow:hidden;background:#000}</style>
</head>
<body>
<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${MP_VERSION}/vision_bundle.mjs";

const video = document.createElement("video");
video.autoplay = true;
video.playsInline = true;
video.muted = true;
video.style.position = "absolute";
video.style.width = "1px";
video.style.height = "1px";
video.style.opacity = "0";
document.body.appendChild(video);

function send(type, payload) {
    parent.postMessage(Object.assign({ type }, payload), "*");
}

async function init() {
    send("status", { code: 1, text: "Loading MediaPipe runtime..." });
    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@${MP_VERSION}/wasm"
    );
    send("status", { code: 2, text: "Creating HandLandmarker..." });
    const handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU",
        },
        runningMode: "VIDEO",
        numHands: 2,
    });
    send("status", { code: 3, text: "HandLandmarker ready; waiting for camera..." });

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        send("status", { code: 7, text: "Camera unavailable: use HTTPS or localhost" });
        return;
    }

    send("status", { code: 4, text: "Requesting camera permission..." });
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480, facingMode: "user" }
    });
    video.srcObject = stream;

    function onReady() {
        send("status", { code: 6, text: "Camera active; running inference..." });
        let lastTime = -1;
        function loop() {
            if (video.currentTime !== lastTime) {
                lastTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                send("results", { results });
            }
            requestAnimationFrame(loop);
        }
        loop();
    }

    video.addEventListener("loadeddata", onReady);
    await video.play();
    if (video.readyState >= 2) {
        onReady();
    }
}

init().catch(err => {
    const text = "MediaPipe init failed: " + (err.message || err.name || err);
    send("status", { code: 9, text });
    console.error(text, err);
});
<\/script>
</body>
</html>
`;

        const iframe = document.createElement("iframe");
        iframe.style.display = "none";
        iframe.srcdoc = iframeSrcdoc;
        document.body.appendChild(iframe);
    </script>
</body>
</html>
