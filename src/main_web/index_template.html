<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>raylib-6-jam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas.game_canvas {
            border: 0; background: #000;
            display: block;
            padding-left: 0; padding-right: 0;
            margin-left: auto; margin-right: auto;
            width: min(720px, 100vw, 100vh);
            height: min(720px, 100vw, 100vh);
        }
    </style>
</head>
<body>
    <canvas class="game_canvas" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"
            onmousedown="event.target.focus()"></canvas>
    <video id="webcam" autoplay playsinline muted style="display:none"></video>
    <script type="text/javascript" src="odin.js"></script>
    <script>
        var odinMemoryInterface = new odin.WasmMemoryInterface();
        odinMemoryInterface.setIntSize(4);
        var odinImports = odin.setupDefaultImports(odinMemoryInterface);

        const MP_HAND_LANDMARK_COUNT = 21;
        const MP_VALUES_PER_LANDMARK = 3;
        window.mpLatestResults = null;

        odinImports.game_bridge = {
            get_hand_landmarks: (ptr, maxHands) => {
                if (!window.mpLatestResults || !window.mpLatestResults.landmarks) {
                    return 0;
                }
                const hands = window.mpLatestResults.landmarks;
                const count = Math.min(hands.length, maxHands);
                const floatsNeeded = count * MP_HAND_LANDMARK_COUNT * MP_VALUES_PER_LANDMARK;
                const mem = odinMemoryInterface.loadF32Array(ptr, floatsNeeded);
                for (let h = 0; h < count; h++) {
                    const landmarks = hands[h];
                    for (let i = 0; i < MP_HAND_LANDMARK_COUNT; i++) {
                        const lm = landmarks[i];
                        const idx = (h * MP_HAND_LANDMARK_COUNT + i) * MP_VALUES_PER_LANDMARK;
                        mem[idx + 0] = lm.x;
                        mem[idx + 1] = lm.y;
                        mem[idx + 2] = lm.z;
                    }
                }
                return count;
            }
        };

        var Module = {
            instantiateWasm: (imports, successCallback) => {
                const newImports = { ...odinImports, ...imports };
                return WebAssembly.instantiateStreaming(fetch("index.wasm"), newImports).then(function(output) {
                    var e = output.instance.exports;
                    odinMemoryInterface.setExports(e);
                    odinMemoryInterface.setMemory(e.memory);
                    return successCallback(output.instance);
                });
            },
            onRuntimeInitialized: () => {
                var e = wasmExports;
                e._start();
                e.main_start();

                function do_main_update() {
                    if (!e.main_update()) {
                        e.main_end();
                        e._end();
                        return;
                    }
                    window.requestAnimationFrame(do_main_update);
                }
                window.requestAnimationFrame(do_main_update);
            },
            canvas: (function() {
                return document.getElementById("canvas");
            })()
        };
    </script>
    {{{ SCRIPT }}}
    <script type="module">
        import {
            HandLandmarker,
            FilesetResolver,
        } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm/vision_bundle.mjs";

        const video = document.getElementById("webcam");
        let handLandmarker = null;
        let webcamRunning = false;

        async function createHandLandmarker() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU",
                },
                runningMode: "VIDEO",
                numHands: 2,
            });
        }

        async function enableCam() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn("Browser API navigator.mediaDevices.getUserMedia not available");
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: "user" }
                });
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    webcamRunning = true;
                    predictWebcam();
                });
            } catch (err) {
                console.error("Failed to start webcam:", err);
            }
        }

        let lastVideoTime = -1;
        async function predictWebcam() {
            if (!webcamRunning || !handLandmarker) return;
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const startTimeMs = performance.now();
                window.mpLatestResults = handLandmarker.detectForVideo(video, startTimeMs);
            }
            window.requestAnimationFrame(predictWebcam);
        }

        await createHandLandmarker();
        enableCam();
    </script>
</body>
</html>
