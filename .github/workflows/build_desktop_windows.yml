name: Build Desktop - Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-desktop-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Odin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "C:\odin" | Out-Null
          Invoke-WebRequest -Uri "https://github.com/odin-lang/Odin/releases/download/dev-2026-06/odin-windows-dev-2026-06.zip" -OutFile "C:\odin\odin.zip"
          Expand-Archive -Path "C:\odin\odin.zip" -DestinationPath "C:\odin" -Force
          Move-Item -Path "C:\odin\odin-windows-dev-2026-06\*" -Destination "C:\odin" -Force
          Remove-Item -Path "C:\odin\odin-windows-dev-2026-06" -Recurse -Force
          "C:\odin" | Out-File -FilePath "$env:GITHUB_PATH" -Append
          C:\odin\odin.exe version

      - name: Build desktop package
        shell: cmd
        run: build_desktop.bat

      - name: Verify output
        shell: cmd
        run: |
          dir build\desktop\game.exe

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: build/desktop/game.exe
