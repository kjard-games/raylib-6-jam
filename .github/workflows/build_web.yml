name: Build Web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Odin
        run: |
          mkdir -p "$HOME/odin"
          curl -L -o "$HOME/odin.tar.gz" "https://github.com/odin-lang/Odin/releases/download/dev-2026-06/odin-linux-amd64-dev-2026-06.tar.gz"
          tar -xzf "$HOME/odin.tar.gz" -C "$HOME/odin" --strip-components=1
          echo "$HOME/odin" >> "$GITHUB_PATH"
          "$HOME/odin/odin" version

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: latest
          actions-cache-folder: 'emsdk-cache'

      - name: Build web package
        run: bash build_web.sh

      - name: Verify outputs
        run: |
          ls -lh build/web/
          echo "WASM + DATA size:"
          du -h build/web/index.wasm build/web/index.data

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
