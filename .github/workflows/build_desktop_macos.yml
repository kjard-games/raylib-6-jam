name: Build Desktop - macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-desktop-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Odin
        run: |
          mkdir -p "$HOME/odin"
          curl -L -o "$HOME/odin.tar.gz" "https://github.com/odin-lang/Odin/releases/download/dev-2026-07/odin-macos-arm64-dev-2026-07.tar.gz"
          tar -xzf "$HOME/odin.tar.gz" -C "$HOME/odin" --strip-components=1
          echo "$HOME/odin" >> "$GITHUB_PATH"
          "$HOME/odin/odin" version

      - name: Build desktop package
        run: bash build_desktop.sh

      - name: Verify output
        run: |
          ls -lh build/desktop/game
          file build/desktop/game

      - name: Verify constraints
        run: bash scripts/check_constraints.sh desktop

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: build/desktop/game
